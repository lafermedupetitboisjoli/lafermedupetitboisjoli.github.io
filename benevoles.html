<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nos Bénévoles — La Ferme du Petit Bois Joli</title>
    <link rel="icon" type="image/jpeg" href="assets/logo/logo.jpg">
  <meta name="description" content="Découvrez les bénévoles passionnés qui font vivre la Ferme du Petit Bois Joli au quotidien.">
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/benevoles.css">
</head>
<body>

<div id="site-header"></div>

<!-- ══ PAGE HERO ══ -->
<div class="page-hero">
  <h1>🤝 Nos Bénévoles</h1>
  <p class="subtitle-page" id="subtitle-page"></p>
</div>

<!-- ══ INTRO ══ -->
<section>
  <div class="section-inner">
    <div class="highlight-box fade-up" style="max-width:780px;margin:0 auto;text-align:center;">
      <p id="intro-texte" style="font-size:1.1rem;line-height:1.9;"></p>
    </div>
  </div>
</section>

<!-- ══ BÉNÉVOLES ══ -->
<section class="bg-wood">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🌻</span>
        <div class="line"></div>
      </div>
      <h2>Notre équipe</h2>
      <p>Des passionné·e·s engagé·e·s pour le bien-être de tous</p>
    </div>

    <!-- Responsables : cartes complètes -->
    <div class="grid-responsables" id="grid-responsables"></div>

    <!-- Bénévoles : cartes mini -->
    <div class="section-title fade-up" id="mini-title" style="margin-top:2rem;display:none;">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🤝</span>
        <div class="line"></div>
      </div>
      <h3 style="font-size:1.6rem;">Nos bénévoles</h3>
    </div>
    <div class="grid-benevoles" id="grid-benevoles"></div>

  </div>
</section>

<section id="parrainage">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">💚</span>
        <div class="line"></div>
      </div>
      <h2 id="parrainage-titre"></h2>
    </div>

    <div class="highlight-box fade-up benevole-parrainage-intro">
      <p id="parrainage-intro"></p>
    </div>

    <div class="fade-up benevole-parrainage-supported">
      <h3>Aujourd'hui, plusieurs de nos animaux ont déjà la chance d'être soutenus :</h3>
      <div class="benevole-parrains-grid" id="parraines-list"></div>
    </div>

    <div class="fade-up benevole-parrainage-supported">
      <h3>Les actions de nos parrains et marraines : </h3>
      <div class="benevole-parrains-grid" id="parraines-actions"></div>
      <p id="parrainage-merci" class="benevole-parrainage-merci"></p>
    </div>

    <div class="fade-up benevole-parrainage-waiting">
      <p id="parrainage-attente"></p>
      <div id="animaux-attente" class="benevole-parrainage-waiting-grid"></div>
    </div>

    <div class="location-card fade-up benevole-parrainage-cta-box">
      <p id="parrainage-conclusion"></p>
      <p id="parrainage-cta" class="benevole-parrainage-cta"></p>
      <a href="mailto:contact@fermedupetitboisjoli.fr?subject=Parrainage d'un animal" class="btn btn-primary">📩 Nous contacter pour parrainer</a>
    </div>
  </div>
</section>

<div class="benevole-lightbox" id="benevole-lightbox" hidden>
  <div class="benevole-lightbox-content">
    <button type="button" class="benevole-lightbox-close" id="benevole-lightbox-close" aria-label="Fermer l image">×</button>
    <button type="button" class="benevole-lightbox-nav benevole-lightbox-prev" id="benevole-lightbox-prev" aria-label="Photo précédente">‹</button>
    <div class="benevole-lightbox-image-wrap">
      <img id="benevole-lightbox-img" src="" alt="">
    </div>
    <button type="button" class="benevole-lightbox-nav benevole-lightbox-next" id="benevole-lightbox-next" aria-label="Photo suivante">›</button>
    <p id="benevole-lightbox-label" class="benevole-lightbox-label"></p>
    <p id="benevole-lightbox-counter" class="benevole-lightbox-counter"></p>
    <div id="benevole-lightbox-thumbs" class="benevole-lightbox-thumbs"></div>
  </div>
</div>

<!-- ══ REJOINDRE ══ -->
<section>
  <div class="section-inner">
    <div class="info-banner fade-up" style="max-width:700px;margin:0 auto;">
      <div style="font-size:2.5rem;margin-bottom:1rem;">🌻</div>
      <h2 id="rejoindre-titre"></h2>
      <p id="rejoindre-texte" style="margin:1rem 0 1.5rem;"></p>
      <a href="rejoindre.html" class="btn" style="background:white;color:var(--green-dark);">🌻 Rejoindre l'équipe</a>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="data/contact.js"></script>
<script src="data/benevoles.js"></script>
<script src="js/benevoles.js"></script>
<script src="js/main.js"></script>
</body>
</html>
