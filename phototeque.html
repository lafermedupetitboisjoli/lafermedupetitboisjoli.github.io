<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photothèque — La Ferme du Petit Bois Joli</title>
  <meta name="description" content="Galerie photos de la Ferme du Petit Bois Joli.">
  <link rel="icon" type="image/jpeg" href="assets/logo/logo.jpg">
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/phototeque.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-hero">
  <h1>📷 Photothèque</h1>
  <p class="subtitle-page">Les plus beaux moments de la ferme</p>
</div>

<section>
  <div class="section-inner">
    <p id="gallery-count" class="text-center" style="color:var(--text-light);font-size:0.9rem;margin-bottom:1.5rem;"></p>
    <div class="photo-grid" id="photo-grid">
      <div class="gallery-state">
        <div class="spinner"></div>
        <p>Chargement des photos…</p>
      </div>
    </div>
  </div>
</section>

<!-- Carrousel lightbox -->
<div id="lb" role="dialog" aria-modal="true">
  <div class="lb-inner">
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <button id="lb-prev" class="lb-arrow" aria-label="Précédent">◀</button>
    <button id="lb-next" class="lb-arrow" aria-label="Suivant">▶</button>
    <div class="lb-footer">
      <div id="lb-counter"></div>
      <div class="lb-thumbs" id="lb-thumbs"></div>
    </div>
  </div>
  <button id="lb-close" aria-label="Fermer">✕</button>
</div>

<div id="site-footer"></div>

<script src="data/contact.js"></script>
<script src="js/main.js"></script>
<script src="js/phototeque.js"></script>
</body>
</html>
