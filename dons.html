<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faire un don — La Ferme du Petit Bois Joli</title>
  <meta name="description" content="Soutenez la Ferme du Petit Bois Joli par un don. Chaque contribution aide nos animaux et finance nos activités pédagogiques en Vendée.">
  <link rel="icon" type="image/jpeg" href="assets/logo/logo.jpg">
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/dons.css">
</head>
<body>

<div id="site-header"></div>

<!-- ══ HERO ══ -->
<div class="don-hero">
  <div style="font-size:3.5rem;margin-bottom:1rem;">💚</div>
  <h1 id="hero-titre"></h1>
  <p class="subtitle-page" id="hero-subtitle"></p>
  <p class="hero-desc" id="hero-desc"></p>
</div>

<!-- ══ POURQUOI DONNER ══ -->
<section>
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🌿</span>
        <div class="line"></div>
      </div>
      <h2 id="pourquoi-titre"></h2>
    </div>
    <div class="cards-grid" id="pourquoi-grid"></div>
  </div>
</section>

<!-- ══ MONTANTS SUGGÉRÉS ══ -->
<section class="bg-wood">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🎯</span>
        <div class="line"></div>
      </div>
      <h2>Combien donner ?</h2>
      <p>Chaque montant a un impact concret sur la vie de la ferme</p>
    </div>
    <div class="montants-grid" id="montants-grid"></div>
  </div>
</section>

<!-- ══ MÉTHODES ══ -->
<section id="helloasso">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">💳</span>
        <div class="line"></div>
      </div>
      <h2>Comment faire un don ?</h2>
      <p>Choisissez la méthode qui vous convient</p>
    </div>
    <div class="cards-grid" id="methodes-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));"></div>
  </div>
</section>

<!-- ══ AVANTAGE FISCAL ══ -->
<section class="bg-alt">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🏛️</span>
        <div class="line"></div>
      </div>
      <h2>Avantage fiscal</h2>
    </div>
    <div class="fiscalite-box fade-up">
      <h3 id="fiscalite-titre"></h3>
      <p id="fiscalite-texte"></p>
      <div class="exemple">💡 <span id="fiscalite-exemple"></span></div>
    </div>
  </div>
</section>

<!-- ══ ADHÉSION ══ -->
<section>
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🤝</span>
        <div class="line"></div>
      </div>
      <h2 id="adhesion-titre"></h2>
    </div>
    <div class="location-card fade-up" style="max-width:700px;margin:0 auto;flex-direction:column;">
      <p id="adhesion-texte" style="font-size:1.05rem;line-height:1.8;text-align:center;margin-bottom:1.5rem;"></p>
      <div id="adhesion-tarifs" style="width:100%;"></div>
      <div style="text-align:center;margin-top:1.5rem;">
        <a href="rejoindre.html#formulaire" class="btn btn-primary">👥 Rejoindre l'équipe</a>
      </div>
    </div>
  </div>
</section>

<!-- ══ BESOINS EN NATURE ══ -->
<section class="bg-wood">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🔹</span>
        <div class="line"></div>
      </div>
      <h2 id="besoins-titre"></h2>
      <p id="besoins-subtitle"></p>
    </div>
    <div class="cards-grid" id="besoins-grid" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));"></div>
    <div class="text-center fade-up" style="margin-top:2rem;">
      <a href="mailto:contact@fermedupetitboisjoli.fr?subject=Don en nature" class="btn btn-primary">📦 Proposer un don en nature</a>
    </div>
  </div>
</section>

<!-- ══ MERCI ══ -->
<section class="bg-alt">
  <div class="section-inner fade-up">
    <div class="merci-banner">
      <div style="font-size:3rem;margin-bottom:0.75rem;">🐾❤️</div>
      <h2 id="merci-titre"></h2>
      <p id="merci-texte"></p>
    </div>
  </div>
</section>

<div id="site-footer"></div>

  </button>
  <div class="modal-content" style="position: relative; width: 100%; max-width: 950px; height: 100%; overflow: hidden;">
    <iframe
      id="haWidget"
      src="https://www.helloasso.com/associations/la-ferme-du-petit-bois-joli/formulaires/3/widget?view=overlay"
      style="width: 100%; height: 100%; border: none; border-radius: 8px;"
    ></iframe>
  </div>
</div>

<script src="data/contact.js"></script>
<script src="data/dons.js"></script>
<script src="js/dons.js"></script>
<script src="js/main.js"></script>
