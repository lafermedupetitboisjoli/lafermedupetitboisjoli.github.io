<!-- ══ LIGHTBOX ══ -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Visionneuse photo">
  <div class="lb-container">
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
      <button id="lb-close" aria-label="Fermer">✕</button>
    </div>
    <button id="lb-prev" class="lb-arrow hidden" aria-label="Précédent">◀</button>
    <button id="lb-next" class="lb-arrow hidden" aria-label="Suivant">▶</button>
    <div class="lb-footer">
      <div id="lb-caption"></div>
      <div class="lb-dots" id="lb-dots"></div>
    </div>
  </div>
</div>

<div id="site-header"></div>

<!-- ══ PAGE HERO ══ -->
<div class="page-hero">
  <h1>🐾 Nos Animaux</h1>
  <p class="subtitle-page" id="subtitle-page"></p>
</div>

<!-- ══ INTRO ══ -->
<section>
  <div class="section-inner">
    <div class="highlight-box fade-up" style="max-width:780px;margin:0 auto;text-align:center;">
      <p id="intro-texte" style="font-size:1.1rem;line-height:1.9;"></p>
    </div>
  </div>
</section>

<!-- ══ ANIMAUX ══ -->
<section class="bg-wood">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🐴</span>
        <div class="line"></div>
      </div>
      <h2>La famille de la ferme</h2>
      <p>Chacun a sa personnalité et attend votre visite avec impatience</p>
    </div>
    <div class="species-filters fade-up" id="species-filters" aria-label="Filtres par espece"></div>
    <div class="cards-grid" id="animaux-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>
  </div>
</section>

<!-- ══ PARAINAGE ══ -->
<div class="cards-grid" id="action-grid" style="display:block;grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>
