<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nos Animaux — La Ferme du Petit Bois Joli</title>
    <link rel="icon" type="image/jpeg" href="assets/logo/logo.jpg">
  <meta name="description" content="Découvrez les animaux de la Ferme du Petit Bois Joli : poney, âne, chèvres, lapins, poules et bien plus encore !">
  <link rel="stylesheet" href="style/main.css">
  <style>
    /* ── Animal card ── */
    .animal-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 25px var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      border: 1px solid rgba(184,146,106,0.2);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .animal-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 50px var(--shadow-strong);
    }

    /* Tag & badge — top-right overlay */
    .animal-top-badges {
      position: absolute;
      top: 0.75rem; right: 0.75rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.4rem;
    }
    .animal-tag {
      background: rgba(255,255,255,0.92);
      color: var(--brown-medium);
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.22rem 0.65rem;
      border-radius: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      border: 1px solid rgba(184,146,106,0.4);
    }
    .new-badge {
      background: var(--pink-accent);
      color: white;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.22rem 0.65rem;
      border-radius: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .pension-badge {
      background: var(--green-dark);
      color: white;
      font-size: 0.72rem;
      font-weight: 800;
      padding: 0.22rem 0.65rem;
      border-radius: 10px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    /* ── Photo gallery / carousel ── */
    .animal-gallery {
      position: relative;
      width: 100%;
      height: 240px;
      overflow: hidden;
      background: linear-gradient(135deg, var(--bg-light) 0%, var(--bg-section) 100%);
      flex-shrink: 0;
    }
    .gallery-track {
      display: flex;
      height: 100%;
      transition: transform 0.4s ease;
    }
    .gallery-slide {
      flex: 0 0 100%;
      height: 100%;
    }
    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* emoji fallback */
    .gallery-slide.emoji-slide {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
    }

    /* Prev / Next arrows */
    .gallery-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.85);
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 5;
      transition: background 0.2s;
    }
    .gallery-btn:hover { background: white; }
    .gallery-btn.prev { left: 0.5rem; }
    .gallery-btn.next { right: 0.5rem; }
    .gallery-btn.hidden { display: none; }

    /* Dots */
    .gallery-dots {
      position: absolute;
      bottom: 0.5rem; left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 0.35rem;
    }
    .gallery-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
    }
    .gallery-dot.active {
      background: white;
      transform: scale(1.3);
    }

    /* ── Card body ── */
    .animal-body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .animal-body h3 {
      font-size: 1.6rem;
      margin-bottom: 0.15rem;
    }
    .animal-espece {
      font-size: 0.85rem;
      color: var(--text-light);
      font-style: italic;
      margin-bottom: 0.75rem;
    }
    .animal-caractere {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--bg-section);
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--brown-medium);
      margin-bottom: 0.75rem;
    }
    .animal-body p {
      font-size: 0.93rem;
      line-height: 1.65;
      margin-bottom: 1rem;
      flex: 1;
    }
    .animal-facts {
      background: var(--bg-light);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
    }
    .animal-fact-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
      color: var(--text-medium);
    }
    .animal-fact-row:last-child { margin-bottom: 0; }
    .animal-fact-label { font-weight: 700; color: var(--green-dark); min-width: 85px; }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(20, 12, 6, 0.88);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #lightbox.open { display: flex; }

    .lb-container {
      position: relative;
      max-width: 860px;
      width: 100%;
      animation: lb-in 0.25s ease;
    }
    @keyframes lb-in {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .lb-img-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      max-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #lb-img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
      transition: opacity 0.2s;
    }
    #lb-img.fading { opacity: 0; }

    /* Close button */
    #lb-close {
      position: fixed;
      top: 1.25rem; right: 1.25rem;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: white;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--brown-dark);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 9999;
      transition: transform 0.15s, background 0.15s;
      line-height: 1;
    }
    #lb-close:hover { transform: scale(1.15) rotate(90deg); background: #fef0f0; }

    /* Arrows */
    .lb-arrow {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 50%;
      width: 46px; height: 46px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.15s;
      z-index: 10;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.3); transform: translateY(-50%) scale(1.1); }
    #lb-prev { left: -58px; }
    #lb-next { right: -58px; }
    .lb-arrow.hidden { display: none; }

    /* Caption & dots */
    .lb-footer {
      text-align: center;
      margin-top: 1rem;
      color: rgba(255,255,255,0.85);
    }
    #lb-caption {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .lb-dots {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
    }
    .lb-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-dot.active { background: white; transform: scale(1.35); }

    /* cursor pointer on gallery slides with photos */
    .gallery-slide img { cursor: zoom-in; }

    @media (max-width: 680px) {
      #lb-prev { left: -0.25rem; background: rgba(0,0,0,0.4); }
      #lb-next { right: -0.25rem; background: rgba(0,0,0,0.4); }
    }
  </style>
</head>
<body>

<!-- ══ LIGHTBOX ══ -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Visionneuse photo">
  <div class="lb-container">
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
      <button id="lb-close" aria-label="Fermer">✕</button>
    </div>
    <button id="lb-prev" class="lb-arrow hidden" aria-label="Précédent">◀</button>
    <button id="lb-next" class="lb-arrow hidden" aria-label="Suivant">▶</button>
    <div class="lb-footer">
      <div id="lb-caption"></div>
      <div class="lb-dots" id="lb-dots"></div>
    </div>
  </div>
</div>

  <h1>🐾 Nos Animaux</h1>

</div>

    </div>

<!-- ══ ANIMAUX ══ -->
<section class="bg-wood">
  <div class="section-inner">
    <div class="section-title fade-up">
      <div class="section-divider">
        <div class="line"></div>
        <span class="icon">🐴</span>
        <div class="line"></div>
      </div>
      <h2>La famille de la ferme</h2>
      <p>Chacun a sa personnalité et attend votre visite avec impatience</p>
    </div>
    <div class="cards-grid" id="animaux-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>
  </div>
</section>

<!-- ══ PARAINAGE ══ -->
<div class="cards-grid" id="action-grid" style="display:block;grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>

<div id="site-footer"></div>

<script src="data/animaux.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const d = animauxData;
  document.getElementById('subtitle-page').textContent = d.intro.sousTitre;
  document.getElementById('intro-texte').textContent   = d.intro.texte;


  const actionGrid = document.getElementById('action-grid');
  d.actions.forEach(a => {
    actionGrid.innerHTML += `
        <section>
          <div class="secti on-inner">
            <div class="section-title fade-up">
              <div class="section-divider">
                <div class="line"></div>
                <span class="icon">🌿</span>
                <div class="line"></div>
              </div>
              <h2 id="parrainage-titre">${a.titre}</h2>
            </div>
            <div class="location-card fade-up" style="max-width:800px;margin:0 auto;">
              <div style="font-size:4rem;text-align:center;flex-shrink:0;">${a.icone}</div>
              <div class="location-info">
                <p id="parrainage-texte" style="font-size:1.05rem;line-height:1.8;">${a.texte}</p>
                <div style="margin-top:1.5rem;">
                  <a href="${a.boutton.lien}" class="btn btn-secondary">${a.boutton.label}</a>
                </div>
              </div>
            </div>
          </div>
        </section>`;
  });
  
  const grid = document.getElementById('animaux-grid');
  d.animaux.forEach((a, idx) => {
    const hasPhotos = a.photos && a.photos.length > 0;

    // Build gallery HTML
    let galleryHtml;
    if (hasPhotos) {
      const slides = a.photos.map(p =>
        `<div class="gallery-slide">
           <img src="assets/photos/${p}" alt="Photo de ${a.nom}" loading="lazy">
         </div>`
      ).join('');
      const dots = a.photos.length > 1
        ? `<div class="gallery-dots">
            ${a.photos.map((_, i) =>
              `<button class="gallery-dot ${i === 0 ? 'active' : ''}" data-i="${i}"></button>`
            ).join('')}
           </div>`
        : '';
      const arrows = a.photos.length > 1
        ? `<button class="gallery-btn prev" aria-label="Précédent">◀</button>
           <button class="gallery-btn next" aria-label="Suivant">▶</button>`
        : '';
      galleryHtml = `
        <div class="animal-gallery">
          <div class="gallery-track">${slides}</div>
          ${arrows}
          ${dots}
        </div>`;
    } else {
      galleryHtml = `
        <div class="animal-gallery">
          <div class="gallery-track">
            <div class="gallery-slide emoji-slide">${a.icone}</div>
          </div>
        </div>`;
    }

    const cardId = `animal-card-${idx}`;
    grid.innerHTML += `
      <div class="animal-card fade-up" id="${cardId}">
        <div class="animal-top-badges"> 
          <span class="animal-tag">${a.tag}</span>
          ${a.nouveaute ? '<span class="new-badge">✨ Nouveau</span>' : ''}
          ${a.pension ? '<span class="pension-badge">🤗 Pension</span>' : ''}
        </div>
        ${galleryHtml}
        <div class="animal-body">
          <h3>${a.nom}</h3>
          <div class="animal-espece">${a.espece}</div>
          <div class="animal-caractere">💛 ${a.caractere}</div>
          <p>${a.description}</p>
          <div class="animal-facts">
            <div class="animal-fact-row">
              <span class="animal-fact-label">🌿 Alimentation</span>
              <span>${a.alimentation}</span>
            </div>
            <div class="animal-fact-row">
              <span class="animal-fact-label">⭐ Le saviez-vous ?</span>
              <span>${a.particularite}</span>
            </div>
          </div>
        </div>
      </div>`;
  });

  // Init carousels after DOM insertion
  document.querySelectorAll('.animal-card').forEach(card => {
    const track = card.querySelector('.gallery-track');
    const dots  = card.querySelectorAll('.gallery-dot');
    const prev  = card.querySelector('.gallery-btn.prev');
    const next  = card.querySelector('.gallery-btn.next');
    if (!track || !prev) return;

    let current = 0;
    const total = track.children.length;

    const goTo = (n) => {
      current = (n + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i === current));
    };

    prev.addEventListener('click', () => goTo(current - 1));
    next.addEventListener('click', () => goTo(current + 1));
    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i)));
    goTo(0);
  });

  // ── Lightbox ──
  const lb        = document.getElementById('lightbox');
  const lbImg     = document.getElementById('lb-img');
  const lbCaption = document.getElementById('lb-caption');
  const lbDotsEl  = document.getElementById('lb-dots');
  const lbPrev    = document.getElementById('lb-prev');
  const lbNext    = document.getElementById('lb-next');
  const lbClose   = document.getElementById('lb-close');

  let lbPhotos = [], lbAnimalName = '', lbIndex = 0;

  const lbGoTo = (n) => {
    lbIndex = (n + lbPhotos.length) % lbPhotos.length;
    lbImg.classList.add('fading');
    setTimeout(() => {
      lbImg.src = 'assets/photos/' + lbPhotos[lbIndex];
      lbImg.alt = lbAnimalName + ' — photo ' + (lbIndex + 1);
      lbImg.classList.remove('fading');
    }, 160);
    lbCaption.textContent = lbAnimalName + (lbPhotos.length > 1 ? ` (${lbIndex + 1} / ${lbPhotos.length})` : '');
    lbDotsEl.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('active', i === lbIndex));
  };

  const openLightbox = (photos, name, startIndex) => {
    lbPhotos = photos;
    lbAnimalName = name;

    // Build dots
    lbDotsEl.innerHTML = photos.length > 1
      ? photos.map((_, i) => `<button class="lb-dot" data-i="${i}"></button>`).join('')
      : '';
    lbDotsEl.querySelectorAll('.lb-dot').forEach(d =>
      d.addEventListener('click', () => lbGoTo(+d.dataset.i))
    );

    lbPrev.classList.toggle('hidden', photos.length <= 1);
    lbNext.classList.toggle('hidden', photos.length <= 1);
    lbImg.src = '';
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    lbGoTo(startIndex);
  };

  const closeLightbox = () => {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    lbImg.src = '';
  };

  // Click on a photo in any card
  document.getElementById('animaux-grid').addEventListener('click', (e) => {
    const imgEl = e.target.closest('.gallery-slide img');
    if (!imgEl) return;
    const card = imgEl.closest('.animal-card');
    const cardIdx = +card.id.replace('animal-card-', '');
    const a = d.animaux[cardIdx];
    if (!a.photos || !a.photos.length) return;
    // Determine which slide is currently visible
    const track = card.querySelector('.gallery-track');
    const slideWidth = card.querySelector('.animal-gallery').offsetWidth;
    const currentSlide = Math.round(Math.abs(parseFloat(track.style.transform.replace(/[^0-9.-]/g, '') || '0')) / 100);
    openLightbox(a.photos, a.nom, isNaN(currentSlide) ? 0 : currentSlide);
  });

  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
  lbPrev.addEventListener('click', () => lbGoTo(lbIndex - 1));
  lbNext.addEventListener('click', () => lbGoTo(lbIndex + 1));

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  lbGoTo(lbIndex - 1);
    if (e.key === 'ArrowRight') lbGoTo(lbIndex + 1);
  });

  setTimeout(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }});
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up:not(.visible)').forEach(el => observer.observe(el));
  }, 100);
});
</script>
</body>
</html>
